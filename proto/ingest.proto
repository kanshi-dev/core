syntax = "proto3";

package kanshi.ingest.v1;

option go_package = "github.com/kanshi-dev/core/proto/ingest/v1;ingest";

message Point {
  string name = 1;
  double value = 2;
  int64 timestamp_unix_nano = 3;
  repeated string tags = 4;
}

message AgentReport {
  string agent_id = 1;
  string hostname = 2;
  string os = 3;
  string platform = 4;
  string arch = 5;
  int32 cpu_cores = 6;
  int64 total_memory = 7;
  string version = 8;
  int64 disk_size = 9;
}

message Batch {
  string agent_id =1;
  repeated Point points = 2;
}

message Ack {
  int64 accepted = 1;
}

service IngestService {
  rpc IngestBatch(Batch) returns (Ack);
  rpc ReportAgent (AgentReport) returns (Ack);
}

